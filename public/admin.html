<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<style>
body{font-family:Arial;background:linear-gradient(135deg,#00f2fe,#4facfe);display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;padding:20px;}
.main-container{display:grid;grid-template-columns:200px 1fr;gap:20px;max-width:1200px;width:100%;}
.nav-menu{background:white;padding:15px;border-radius:12px;height:fit-content;box-shadow:0 8px 20px rgba(0,0,0,0.2);}
.nav-menu h3{margin-top:0;color:#333;}
.nav-menu a,.nav-menu button{display:block;width:100%;padding:10px;margin-bottom:8px;background:#4facfe;color:white;border:none;border-radius:6px;text-decoration:none;cursor:pointer;text-align:left;font-size:14px;font-family:Arial;}
.nav-menu a:hover,.nav-menu button:hover{background:#007bff;}
.nav-menu a.active{background:#007bff;}
.container{background:white;padding:20px;border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,0.2);}
h2{margin-top:0;color:#333;font-size:18px;}
input,textarea,select{width:100%;padding:6px;margin-top:4px;margin-bottom:8px;border-radius:6px;border:1px solid #ccc;font-size:12px;}
textarea{height:45px;}
button{width:100%;padding:8px;background:#4facfe;color:white;border:none;border-radius:6px;font-size:13px;cursor:pointer;}
button:hover{background:#007bff;}
.latlong{display:flex;gap:8px;}
.latlong input{flex:1;}
#preview{width:100%;margin-top:5px;border-radius:6px;display:none;}
.form-section{margin-bottom:30px;}
.properties-list{background:white;border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,0.2);margin-top:30px;overflow:hidden;}
.properties-list h3{padding:20px;margin:0;border-bottom:1px solid #eee;color:#333;}
.property-card{padding:15px;border-bottom:1px solid #eee;background:white;}
.property-card:hover{background:#f9f9f9;}
.property-info{margin-bottom:10px;}
.property-info h4{margin:0 0 5px 0;color:#333;font-size:14px;}
.property-info p{margin:3px 0;color:#666;font-size:12px;}
.property-actions{display:flex;gap:8px;justify-content:flex-end;}
.btn-small{padding:6px 12px;font-size:11px;background:#2196F3;color:white;border:none;border-radius:4px;cursor:pointer;}
.btn-small:hover{background:#007bff;}
.btn-small.delete{background:#f44336;}
.btn-small.delete:hover{background:#da190b;}
.no-properties{padding:20px;text-align:center;color:#999;}
@media(max-width:768px){.main-container{grid-template-columns:1fr;}.nav-menu{display:grid;grid-template-columns:repeat(2,1fr);height:auto;}}
</style>
</head>
<body>
<div class="main-container">
  <div class="nav-menu">
    <h3>📋 Management</h3>
    <a href="admin.html" class="active">🏠 Add Property</a>
    <a href="city.html">🏙️ Cities</a>
    <a href="amenities.html">✨ Amenities</a>
    <a href="township.html">🏘️ Townships</a>
    <a href="project.html">🏗️ Projects</a>
    <a href="building.html">🏢 Buildings</a>
    <a href="apartment.html">🏠 Apartments</a>
  </div>

<div class="container">
<div class="form-section">
<h2>Add Property</h2>
<form id="propertyForm">
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
  <div>
    <label>City</label>
    <select id="citySelect">
      <option value="">Select City</option>
      <option value="Jaipur">Jaipur</option>
      <option value="Ajmer">Ajmer</option>
    </select>
  </div>
  <div>
    <label>Township</label>
    <select id="townshipSelect">
      <option value="">Select Township</option>
    </select>
  </div>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
  <div>
    <label>Project</label>
    <select id="projectSelect">
      <option value="">Select Project</option>
    </select>
  </div>
  <div>
    <label>Property Type</label>
    <select id="property_type">
      <option value="">Select Property Type</option>
    </select>
  </div>
</div>

<div id="buildingSection" style="display: none; margin-bottom: 15px;">
  <label>Building (For Apartments Only)</label>
  <select id="buildingSelect">
    <option value="">Select Building</option>
  </select>
</div>

<input id="title" placeholder="Title">
<textarea id="description" placeholder="Description"></textarea>
<input id="location" placeholder="Location">
<div class="latlong">
<input id="latitude" placeholder="Latitude">
<input id="longitude" placeholder="Longitude">
</div>
<select id="bhk"><option value="">Select BHK</option></select>
<select id="construction_type"><option value="">Select Construction Type</option></select>
<select id="construction_status"><option value="">Select Construction Status</option></select>
<input id="price" placeholder="Price">
<input id="area_sqft" placeholder="Area Sqft">
<select id="verified"><option value="1">Verified</option><option value="0">Not Verified</option></select>
<label>Upload Property Image</label>
<input type="file" id="image" accept="image/*" onchange="previewImage(event)">
<img id="preview">
<button type="button" onclick="addProperty()">Submit</button>
</form>
</div>

<div class="properties-list">
<h3>📦 All Properties</h3>
<div id="propertiesList"></div>
</div>
</div>

<script>
const API_BASE = '/api';

// Setup hierarchy dropdown listeners
document.addEventListener('DOMContentLoaded', () => {
  loadCities();
  loadOptions();
  document.getElementById('citySelect').addEventListener('change', loadTownships);
  document.getElementById('townshipSelect').addEventListener('change', loadProjects);
  document.getElementById('projectSelect').addEventListener('change', loadBuildings);
  document.getElementById('property_type').addEventListener('change', toggleBuildingSection);
});

async function loadCities() {
  try {
    const response = await fetch(`${API_BASE}/cities`);
    const cities = await response.json();
    
    const citySelect = document.getElementById('citySelect');
    citySelect.innerHTML = '<option value="">Select City</option>';
    
    cities.forEach(city => {
      const option = document.createElement('option');
      option.value = city.name;
      option.textContent = city.name;
      citySelect.appendChild(option);
    });
  } catch (error) {
    console.error('Error loading cities:', error);
  }
}

function toggleBuildingSection() {
  const propertyType = document.getElementById('property_type').value;
  const buildingSection = document.getElementById('buildingSection');
  
  if (propertyType.toLowerCase() === 'apartment') {
    buildingSection.style.display = 'block';
  } else {
    buildingSection.style.display = 'none';
    document.getElementById('buildingSelect').value = ''; // Clear selection
  }
}

async function loadTownships() {
  const city = document.getElementById('citySelect').value;
  const townshipSelect = document.getElementById('townshipSelect');
  
  if (!city) {
    townshipSelect.innerHTML = '<option value="">Select Township</option>';
    return;
  }

  try {
    const response = await fetch(`${API_BASE}/townships`);
    const townships = await response.json();
    
    const filteredTownships = townships.filter(t => t.city === city);
    
    if (filteredTownships.length === 0) {
      townshipSelect.innerHTML = '<option value="">No townships in this city</option>';
      return;
    }
    
    townshipSelect.innerHTML = `
      <option value="">Select Township</option>
      ${filteredTownships.map(t => `<option value="${t.township_id}">${t.name}</option>`).join('')}
    `;
    document.getElementById('projectSelect').innerHTML = '<option value="">Select Project</option>';
    document.getElementById('buildingSelect').innerHTML = '<option value="">Select Building</option>';
  } catch (error) {
    console.error('Error loading townships:', error);
  }
}

async function loadProjects() {
  const townshipId = document.getElementById('townshipSelect').value;
  const projectSelect = document.getElementById('projectSelect');
  
  if (!townshipId) {
    projectSelect.innerHTML = '<option value="">Select Project</option>';
    return;
  }

  try {
    const response = await fetch(`${API_BASE}/township/${townshipId}/projects`);
    const projects = await response.json();
    
    if (projects.length === 0) {
      projectSelect.innerHTML = '<option value="">No projects in this township</option>';
      return;
    }
    
    projectSelect.innerHTML = `
      <option value="">Select Project</option>
      ${projects.map(p => `<option value="${p.project_id}">${p.name}</option>`).join('')}
    `;
    document.getElementById('buildingSelect').innerHTML = '<option value="">Select Building</option>';
  } catch (error) {
    console.error('Error loading projects:', error);
  }
}

async function loadBuildings() {
  const projectId = document.getElementById('projectSelect').value;
  const buildingSelect = document.getElementById('buildingSelect');
  
  if (!projectId) {
    buildingSelect.innerHTML = '<option value="">Select Building</option>';
    return;
  }

  try {
    const response = await fetch(`${API_BASE}/project/${projectId}/buildings`);
    const buildings = await response.json();
    
    if (buildings.length === 0) {
      buildingSelect.innerHTML = '<option value="">No buildings in this project</option>';
      return;
    }
    
    buildingSelect.innerHTML = `
      <option value="">Select Building</option>
      ${buildings.map(b => `<option value="${b.building_id}">${b.name}${b.block ? ` (Block ${b.block})` : ''}</option>`).join('')}
    `;
  } catch (error) {
    console.error('Error loading buildings:', error);
  }
}

async function loadOptions(){
  try {
    const res = await fetch("/api/options");
    if(!res.ok) throw new Error("API Status: " + res.status);
    
    const data = await res.json();
    console.log("Options loaded:", data);
    
    if(data.bhk && data.bhk.length > 0) {
      data.bhk.forEach(item=>{
          const opt=document.createElement("option");
          opt.value=item.bhk;
          opt.text=item.bhk+" BHK";
          document.getElementById("bhk").appendChild(opt);
      });
    }
    console.log('data.property_type:', data.property_type);
    if(data.property_type && data.property_type.length > 0) {
      data.property_type.forEach(item=>{
          const opt=document.createElement("option");
          opt.value=item.name;
          opt.text=item.name;
          document.getElementById("property_type").appendChild(opt);
      });
    }
    if(data.construction_type && data.construction_type.length > 0) {
      data.construction_type.forEach(item=>{
          const opt=document.createElement("option");
          opt.value=item.name;
          opt.text=item.name;
          document.getElementById("construction_type").appendChild(opt);
      });
    }
    if(data.construction_status && data.construction_status.length > 0) {
      data.construction_status.forEach(item=>{
          const opt=document.createElement("option");
          opt.value=item.name;
          opt.text=item.name;
          document.getElementById("construction_status").appendChild(opt);
      });
    }
  } catch(err) {
    console.error("Options load error:", err);
    alert("Warning: Could not load dropdown options. DB might be empty.\nBut you can still submit!");
  }
}
loadOptions();

function previewImage(event){
    const reader=new FileReader();
    reader.onload=function(){
        const img=document.getElementById("preview");
        img.src=reader.result;
        img.style.display="block";
    }
    reader.readAsDataURL(event.target.files[0]);
}

async function addProperty(){
    try {
      // Validation
      const title = document.getElementById("title").value.trim();
      const description = document.getElementById("description").value.trim();
      const location = document.getElementById("location").value.trim();
      
      if(!title || !description || !location) {
          alert("Please fill Title, Description, and Location!");
          return;
      }
      
      const formData=new FormData();
      // Add hierarchy IDs if available
      const township_id = document.getElementById("townshipSelect").value;
      const project_id = document.getElementById("projectSelect").value;
      const building_id = document.getElementById("buildingSelect").value;
      
      if(township_id) formData.append("township_id", township_id);
      if(project_id) formData.append("project_id", project_id);
      if(building_id) formData.append("building_id", building_id);
      
      // Add all form fields
      ["title","description","location","latitude","longitude","bhk","property_type","construction_type","construction_status","price","area_sqft","verified"].forEach(id=>{
          formData.append(id, document.getElementById(id).value);
      });
      const imageFile=document.getElementById("image").files[0];
      if(imageFile) formData.append("image", imageFile);

      console.log("Submitting form...");
      const res=await fetch("/api/admin/property",{ method:"POST", body:formData });
      console.log("Raw response:", res);
      const data=await res.json();
      
      console.log("Response:", data);
      console.log("Status:", res.status);

      if(res.ok){
          alert("✓ Property Added Successfully");
          document.getElementById("propertyForm").reset();
          document.getElementById("preview").style.display="none";
          loadProperties();
      } else {
          alert("Error: "+(data.error || "Unknown error"));
      }
    } catch(err) {
      console.error("Submit error:", err);
      alert("Error: " + err.message);
    }
}

async function loadProperties(){
  try {
    console.log("📡 Fetching properties...");
    const response = await fetch("/api/properties");
    console.log("📥 Response status:", response.status);
    console.log("📥 Response ok:", response.ok);
    
    if(!response.ok) {
      throw new Error("API returned status " + response.status);
    }
    
    const data = await response.json();
    console.log("📊 Raw response data:", data);
    console.log("📊 Data type:", typeof data);
    console.log("📊 Is array:", Array.isArray(data));
    
    // Handle both array and object responses
    let properties = Array.isArray(data) ? data : (data.properties || data.data || []);
    console.log("📊 Properties after processing:", properties);
    console.log("📊 Properties count:", properties ? properties.length : 0);
    
    const listDiv = document.getElementById("propertiesList");
    
    if (!properties || properties.length === 0) {
      console.log("ℹ️ No properties to display");
      listDiv.innerHTML = '<div class="no-properties">No properties added yet</div>';
      return;
    }
    
    console.log("✅ Rendering", properties.length, "properties");
    listDiv.innerHTML = properties.map(p => `
      <div class="property-card">
        <div class="property-info">
          <h4>${p.title}</h4>
          <p><strong>Type:</strong> ${p.property_type || 'N/A'}</p>
          <p><strong>Location:</strong> ${p.location}</p>
          ${p.bhk ? `<p><strong>BHK:</strong> ${p.bhk}</p>` : ''}
          ${p.price ? `<p><strong>Price:</strong> ₹${parseFloat(p.price).toLocaleString('en-IN')}</p>` : ''}
          ${p.area_sqft ? `<p><strong>Area:</strong> ${p.area_sqft} sqft</p>` : ''}
          ${p.construction_status ? `<p><strong>Status:</strong> ${p.construction_status}</p>` : ''}
          ${p.description ? `<p><strong>Description:</strong> ${p.description.substring(0, 100)}...</p>` : ''}
        </div>
        <div class="property-actions">
          <button class="btn-small" onclick="deleteProperty(${p.property_id})">Delete</button>
        </div>
      </div>
    `).join('');
  } catch (error) {
    console.error('❌ Error loading properties:', error);
    console.error('❌ Error message:', error.message);
    document.getElementById("propertiesList").innerHTML = '<div class="no-properties">❌ Error loading properties: ' + error.message + '</div>';
  }
}

async function deleteProperty(id) {
  if (!confirm('Are you sure you want to delete this property?')) return;
  
  try {
    const response = await fetch(`/api/properties/${id}`, {
      method: 'DELETE'
    });
    
    if (response.ok) {
      alert('Property deleted successfully!');
      loadProperties();
    } else {
      alert('Error deleting property');
    }
  } catch (error) {
    alert('Error: ' + error.message);
  }
}

// Load properties on page load
document.addEventListener('DOMContentLoaded', () => {
  loadProperties();
});
</script>
</div>
</div>
</body>
</html>
